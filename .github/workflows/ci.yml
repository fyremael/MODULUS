name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check modulus scripts

      - name: API docs freshness
        run: python scripts/generate_api_docs.py --check

      - name: Test
        run: python -m pytest

  benchmark-report:
    runs-on: ubuntu-latest
    needs: test-and-lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + report deps
        run: python -m pip install -e ".[dev,report]"

      - name: Run quick benchmark
        run: |
          rm -rf artifacts/benchmarks/ci_run
          python scripts/run_benchmarks.py --steps 20 --warmup-steps 3 --batch-size 32 --width 64 --out-dir artifacts/benchmarks/ci_run

      - name: Build benchmark report
        run: python scripts/build_benchmark_report.py --run-dir artifacts/benchmarks/ci_run --with-plots

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-${{ github.sha }}
          path: artifacts/benchmarks/ci_run
          if-no-files-found: error
